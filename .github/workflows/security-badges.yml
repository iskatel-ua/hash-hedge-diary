name: Generate Security Badges

on:
  workflow_run:
    workflows: ["VirusTotal Security Scan"]
    types:
      - completed
  workflow_dispatch:

jobs:
  badges:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download latest scan results
        uses: actions/download-artifact@v4
        with:
          name: virustotal-results
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: Generate security badges
        run: |
          mkdir -p .github/badges
          
          # Check if results file exists
          if [ -f "virustotal-results.json" ]; then
          echo "Results file found, parsing..."
          python3 > /dev/null << 'EOF'
    import json
          import os

    with open('virustotal-results.json', 'r') as f:
      results = json.load(f)

    stats = results.get('stats', {})
    malicious = stats.get('malicious', 0)
    suspicious = stats.get('suspicious', 0)
    undetected = stats.get('undetected', 0)

    # Determine status and color
    if malicious > 0:
      status = 'MALICIOUS'
      color = '#d32f2f'  # Red
      text = f'MALICIOUS ({malicious})'
    elif suspicious > 0:
      status = 'SUSPICIOUS'
      color = '#fbc02d'  # Yellow
      text = f'SUSPICIOUS ({suspicious})'
    else:
      status = 'SAFE'
      color = '#388e3c'  # Green
      text = 'SAFE'

    # Generate SVG badge
    svg_content = f'''<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="160" height="20" role="img" aria-label="security: {text}">
      <title>security: {text}</title>
      <linearGradient id="s" x2="0" y2="100%">
        <stop offset="0" stop-color="#bbb"/>
        <stop offset="1" stop-color="#999"/>
      </linearGradient>
      <clipPath id="r">
        <rect width="160" height="20" rx="3" fill="#fff"/>
      </clipPath>
      <g clip-path="url(#r)">
        <rect width="95" height="20" fill="#555"/>
        <rect x="95" width="65" height="20" fill="{color}"/>
        <rect width="160" height="20" fill="url(#s)"/>
      </g>
      <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
        <text aria-hidden="true" x="485" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="850">virustotal</text>
        <text x="485" y="140" transform="scale(.1)" fill="#fff" textLength="850">virustotal</text>
        <text aria-hidden="true" x="1265" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="550">{text}</text>
        <text x="1265" y="140" transform="scale(.1)" fill="#fff" textLength="550">{text}</text>
      </g>
    </svg>'''

    with open('.github/badges/security-status.svg', 'w') as f:
      f.write(svg_content)

    print(f"✓ Generated badge: {status}")
    EOF
          else
            echo "No results file found, creating default badge..."
            cat > .github/badges/security-status.svg << 'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="160" height="20" role="img" aria-label="security: pending">
              <title>security: pending</title>
              <linearGradient id="s" x2="0" y2="100%">
                  <stop offset="0" stop-color="#bbb"/>
                  <stop offset="1" stop-color="#999"/>
              </linearGradient>
              <clipPath id="r">
                  <rect width="160" height="20" rx="3" fill="#fff"/>
              </clipPath>
              <g clip-path="url(#r)">
                  <rect width="95" height="20" fill="#555"/>
                  <rect x="95" width="65" height="20" fill="#9c27b0"/>
                  <rect width="160" height="20" fill="url(#s)"/>
              </g>
              <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
                  <text aria-hidden="true" x="485" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="850">virustotal</text>
                  <text x="485" y="140" transform="scale(.1)" fill="#fff" textLength="850">virustotal</text>
                  <text aria-hidden="true" x="1265" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="550">PENDING</text>
                  <text x="1265" y="140" transform="scale(.1)" fill="#fff" textLength="550">PENDING</text>
              </g>
          </svg>
          SVG
            echo "✓ Generated default badge (PENDING)"
          fi
      
      - name: Update README badge link
        run: |
          if [ -f "virustotal-results.json" ]; then
            PERMALINK=$(python3 -c "import json; print(json.load(open('virustotal-results.json'))['permalink'])")
            if [ -n "$PERMALINK" ]; then
              sed -i "s|(https://www.virustotal.com/gui/file/[a-f0-9]*)|(${PERMALINK})|g" README.md
              echo "Updated README badge link to: $PERMALINK"
            fi
          fi

      - name: Commit and push badges
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/security-status.svg README.md
          git commit -m "chore: update security status badge and VT permalink" || echo "No changes to commit"
          git push || echo "Nothing to push"
