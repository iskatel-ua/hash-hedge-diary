name: VirusTotal Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests tqdm
      
      - name: Create archive for scanning
        run: |
          # Get version from manifest.json
          VERSION=$(python -c "import json; print(json.load(open('manifest.json'))['version'])")
          # Create zip archive excluding unnecessary files
          zip -r hash-hadge-$VERSION.zip . \
            -x ".git/*" ".github/*" "node_modules/*" "*.zip" ".gitignore" "demo.jpg"
          echo "SCAN_FILE=hash-hadge-$VERSION.zip" >> $GITHUB_ENV
      
      - name: Scan with VirusTotal
        id: vt_scan
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          python << 'EOF'
          import requests
          import json
          import time
          import os
          import hashlib
          
          api_key = os.getenv('VT_API_KEY')
          if not api_key:
              print("::warning::VirusTotal API key not configured. Skipping scan.")
              exit(0)
          
          scan_file = os.getenv('SCAN_FILE')
            with open(scan_file, 'rb') as f:
              file_sha256 = hashlib.sha256(f.read()).hexdigest()
            print(f"File SHA256: {file_sha256}")
          
          # Upload file
          print(f"Uploading {scan_file} to VirusTotal...")
          with open(scan_file, 'rb') as f:
              files = {'file': f}
              headers = {'x-apikey': api_key}
              response = requests.post(
                  'https://www.virustotal.com/api/v3/files',
                  headers=headers,
                  files=files
              )
          
          if response.status_code != 200:
              print(f"Upload failed: {response.status_code}")
              print(response.text)
              exit(1)
          
          data = response.json()
          analysis_id = data['data']['id']
          print(f"Analysis ID: {analysis_id}")
          
          # Wait for analysis to complete
          print("Waiting for analysis to complete...")
          max_retries = 30
          retry = 0
          
          while retry < max_retries:
              time.sleep(2)
              
              headers = {'x-apikey': api_key}
              response = requests.get(
                  f'https://www.virustotal.com/api/v3/analyses/{analysis_id}',
                  headers=headers
              )
              
              if response.status_code != 200:
                  print(f"Error getting analysis: {response.status_code}")
                  exit(1)
              
              analysis = response.json()
              status = analysis['data']['attributes']['status']
              
              if status == 'completed':
                  print("Analysis completed!")
                  break
              
              print(f"Status: {status} (attempt {retry+1}/{max_retries})")
              retry += 1
          
          # Get results
          stats = analysis['data']['attributes']['stats']
          results = analysis['data']['attributes']['results']
          
          malicious = stats.get('malicious', 0)
          suspicious = stats.get('suspicious', 0)
          undetected = stats.get('undetected', 0)
          
          print(f"\n=== VirusTotal Results ===")
          print(f"Malicious: {malicious}")
          print(f"Suspicious: {suspicious}")
          print(f"Undetected: {undetected}")
          
          # Save results to JSON
          with open('virustotal-results.json', 'w') as f:
              json.dump({
                  'analysis_id': analysis_id,
                'file_sha256': file_sha256,
                  'stats': stats,
                  'scan_date': analysis['data']['attributes']['date'],
                'permalink': f"https://www.virustotal.com/gui/file/{file_sha256}"
              }, f, indent=2)
          
          # Fail if malicious detected
          if malicious > 0:
              print(f"\n::error::VirusTotal detected {malicious} malicious signature(s)!")
              exit(1)
          
          if suspicious > 0:
              print(f"\n::warning::VirusTotal detected {suspicious} suspicious signature(s)")
          
          EOF
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: virustotal-results
          path: virustotal-results.json
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## ✅ VirusTotal Security Scan\n\n';
            
            try {
              const results = JSON.parse(fs.readFileSync('virustotal-results.json', 'utf8'));
              const stats = results.stats;
              
              comment += `| Status | Count |\n`;
              comment += `|--------|-------|\n`;
              comment += `| 🟢 Undetected | ${stats.undetected || 0} |\n`;
              comment += `| 🟡 Suspicious | ${stats.suspicious || 0} |\n`;
              comment += `| 🔴 Malicious | ${stats.malicious || 0} |\n\n`;
              comment += `[View full report](${results.permalink})`;
            } catch (e) {
              comment += 'Scan was skipped (API key not configured)';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
