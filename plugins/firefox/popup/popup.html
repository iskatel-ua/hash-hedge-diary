<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>...</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <span class="header__title">...</span>
    <div class="header__actions">
      <button class="btn-lang" id="btnLang" type="button">EN</button>
      <button class="btn-reload-tab" id="btnReloadTab" type="button" title="Reload trade tab">↻</button>
      <a class="btn-donate" id="btnDonate" href="https://iskatel-ua.github.io/hash-hedge-diary/docs/" target="_blank" rel="noopener noreferrer">Thank you</a>
      <span class="header__logo" aria-hidden="true">
        <img class="header__logo-image" src="../assets/images/logo.png" alt="" />
      </span>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs" role="tablist" aria-label="Popup tabs">
    <button class="tab-btn tab-btn--active" id="tabStats" role="tab" aria-selected="true" aria-controls="panelStats" type="button"><span id="tabStatsLabel">Статистика</span></button>
    <button class="tab-btn" id="tabOpenDeals" role="tab" aria-selected="false" aria-controls="panelOpenDeals" type="button">
      <span id="tabOpenDealsLabel">Позиции</span>
      <span class="tab-btn__count" id="openDealsCount">0</span>
    </button>
    <button class="tab-btn" id="tabSettings" role="tab" aria-selected="false" aria-controls="panelSettings" type="button"><span id="tabSettingsLabel">Настройки</span></button>
  </div>

  <!-- Error message -->
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <section class="tab-panel tab-panel--active" id="panelStats" role="tabpanel" aria-labelledby="tabStats">
    <!-- Metrics grid — populated by popup.js -->
    <div class="metrics-grid" id="metricsGrid">
      <!-- Skeleton placeholders shown before data loads -->
      <div class="metric-card">
        <div class="metric-card__label skeleton">Win Rate</div>
        <div class="metric-card__value skeleton">000.00%</div>
        <div class="metric-card__sub skeleton">0 W / 0 L</div>
      </div>
      <div class="metric-card">
        <div class="metric-card__label skeleton">Total PNL</div>
        <div class="metric-card__value skeleton">+0000.00</div>
        <div class="metric-card__sub skeleton">across 0 trades</div>
      </div>
      <div class="metric-card metric-card--wide">
        <div class="metric-card__label skeleton">Direction Split</div>
        <div class="metric-card__value skeleton">0 ↑ / 0 ↓</div>
        <div class="metric-card__sub skeleton">Total: 0</div>
      </div>
    </div>
  </section>

  <section class="tab-panel" id="panelOpenDeals" role="tabpanel" aria-labelledby="tabOpenDeals" hidden>
    <div class="positions-wrap" id="positionsWrap"></div>
    <div class="positions-empty" id="positionsEmpty">Позиции не найдены</div>
  </section>

  <section class="tab-panel" id="panelSettings" role="tabpanel" aria-labelledby="tabSettings" hidden>
    <div class="settings-panel">
      <div class="settings-card">
        <div class="settings-card__title" id="settingsTitle">SL / TP</div>

        <label class="settings-range" for="slRange">
          <span class="settings-range__head">
            <span id="slRangeLabel">SL</span>
            <strong id="slRangeValue">1%</strong>
          </span>
          <span class="settings-range__sub" id="slRangeHint">Процент от цены входа</span>
          <input id="slRange" type="range" min="1" max="15" step="1" value="1" />
        </label>

        <label class="settings-range" for="tpRange">
          <span class="settings-range__head">
            <span id="tpRangeLabel">TP</span>
            <strong id="tpRangeValue">1%</strong>
          </span>
          <span class="settings-range__sub" id="tpRangeHint">Процент от цены входа</span>
          <input id="tpRange" type="range" min="1" max="50" step="1" value="1" />
        </label>
      </div>

      <div class="settings-actions">
        <button class="btn-settings" id="btnExportSettings" type="button">Экспорт JSON</button>
        <button class="btn-settings" id="btnImportSettings" type="button">Импорт JSON</button>
        <input id="settingsImportInput" type="file" accept="application/json,.json" hidden />
      </div>
    </div>
  </section>

  <div class="position-action-menu" id="positionActionMenu" hidden>
    <div class="position-action-menu__title" id="positionActionTitle">SL / TP</div>
    <div class="position-action-menu__meta" id="positionActionMeta"></div>
    <div class="position-action-menu__prices" id="positionActionPrices"></div>
    <button class="btn-settings btn-settings--primary" id="btnApplyDefaultStops" type="button">Задать SL / TP по умолчанию</button>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <button class="btn-refresh" id="btnRefresh" disabled>
      ↻ ...
    </button>
    <span class="footer__count" id="tradeCount"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
